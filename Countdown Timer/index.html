<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
    rel="stylesheet"/>
     <title>Countdown timer</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="timerArea">
            <div class="timeBtn">
                <i class="ri-check-line"></i>
                <p>time</p>
            </div>
            <div class="showCounter">
                <span id="counter">05:00</span>
            </div>
            <div class="btn" id="btn" style="position: relative;">
                <i class="ri-refresh-line"></i>
                <span style="position: absolute; top: -10px; right: -25px; background: gold; color: #222; font-size: 0.8rem; font-weight: bold; padding: 2px 8px; border-radius: 12px; box-shadow: 0 1px 4px #0002; letter-spacing: 1px;">VIP</span>
            </div>
        </div>
    </div>
     <script src="app.js"></script>
</body>
</html>
